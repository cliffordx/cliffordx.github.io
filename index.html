<!DOCTYPE html>
<html>
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" href="stylesheets/stylesheet.css" media="screen">
    <link rel="stylesheet" type="text/css" href="stylesheets/github-dark.css" media="screen">
    <link rel="stylesheet" type="text/css" href="stylesheets/print.css" media="print">

    <title>Clifford Enoc</title>
    
    <style>
      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      
      .header-text {
        flex: 1;
      }
      
      .profile-photo {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        margin-left: 20px;
      }
      
      @media (max-width: 768px) {
        .header-content {
          flex-direction: column;
          align-items: flex-start;
        }
        
        .profile-photo {
          margin-left: 0;
          margin-top: 15px;
        }
      }
    </style>
  </head>

  <body>

    <header>
      <div class="container">
        <h1>Clifford Enoc</h1>
        <h2>My Personal Ramblings Of Internet Of Things</h2>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        <div class="header-content">
          <div class="header-text">
            <h3>
              <a id="welcome-to-github-pages" class="anchor" href="#welcome-to-github-pages" aria-hidden="true"><span class="octicon octicon-link"></span></a>Hello.
            </h3>
            <p><a href="https://cliffordx.github.io/legalbai">Here is my law school journey journal/blog.</a></p>
          </div>
          <img id="profilePhoto" class="profile-photo" alt="Profile Photo" src="images/IMG_4642.JPG">
        </div>
      </section>
    </div>

    <script type="text/javascript">
      var gaJsHost = (("https:" == document.location.protocol) ? "https://ssl." : "http://www.");
      document.write(unescape("%3Cscript src='" + gaJsHost + "google-analytics.com/ga.js' type='text/javascript'%3E%3C/script%3E"));
    </script>
    <script type="text/javascript">
      try {
        var pageTracker = _gat._getTracker("UA-34264236-16");
        pageTracker._trackPageview();
      } catch(err) {}
    </script>
    
    <script>
      // You can use this function to set the profile photo
      function setProfilePhoto(photoUrl) {
        document.getElementById("profilePhoto").src = photoUrl;
      }
      
      // Example usage:
      // setProfilePhoto("path/to/your/photo.jpg");
      // You can call this function with your photo URL after the page loads
    </script>

  </body>
</html>
